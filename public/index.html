<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ADSENSE META TAG -->
    <meta name="google-adsense-account" content="ca-pub-8110849175507420">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8110849175507420"
     crossorigin="anonymous"></script>

    <!-- Primary SEO -->
    <title>Ruhen Rai – Graphic Design Portfolio</title>
    <meta
      name="description"
      content="Explore the portfolio of Ruhen Rai, a graphic designer focused on visual storytelling, posters, animated pieces, and unique digital experiences."
    />
    <meta
      name="keywords"
      content="Ruhen Rai, graphic designer, poster design, animated graphics, digital art, visual storytelling, portfolio"
    />
    <meta name="author" content="Ruhen Rai" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#950c1c" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon1.svg" />
    <link rel="alternate icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ruhen Rai Portfolio" />
    <meta
      property="og:title"
      content="Ruhen Rai – Graphic Design & Visual Storytelling Portfolio"
    />
    <meta
      property="og:description"
      content="Browse a curated collection of posters, animated artwork, and digital visuals by Ruhen Rai."
    />
    <meta property="og:url" content="https://ruhenrai-portfolio.web.app/" />
    <!-- Replace with a real preview image URL (1200x630 recommended) ------------------------------------------------------------------------------>
    <meta
      property="og:image"
      content="https://your-domain.com/og-preview.jpg"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Ruhen Rai – Graphic Design Portfolio"
    />
    <meta
      name="twitter:description"
      content="Posters, animated pieces, and digital experiments by Ruhen Rai."
    />
    <meta
      name="twitter:image"
      content="https://your-domain.com/og-preview.jpg"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://your-domain.com/" />

    <!-- Cloudinary upload widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap"
      rel="stylesheet"
    />
  </head>
